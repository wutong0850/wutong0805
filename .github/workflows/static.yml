<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小up的资源与工具 </title>

    <style>
        /* ========== CSS 变量（亮色 / 深色） ========== */
        :root {
            --bg-gradient-start: #ffffff;
            --bg-gradient-end: #ffffff;
            --text-primary: #333333;
            --text-secondary: #444444;
            --text-muted: #666666;
            --card-bg: #fffdfd;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --card-shadow-hover: 0 8px 24px rgba(0, 122, 255, 0.15);
            --card-hover-bg: #ffffff57;
            --border-left-color: #007aff;
            --toggle-bg: #e0e0e0;
            --toggle-dot: #ffffff;
            --icon-filter: none;
            --about-divider: #ddd;
            --about-link: #007aff;
            --transition-speed: 0.35s;
        }

        /* 深色模式变量 —— 通过 .dark 类触发 */
        .dark {
            --bg-gradient-start: #0f0f1a;
            --bg-gradient-end: #1a1a2e;
            --text-primary: #e8e8f0;
            --text-secondary: #c0c0d0;
            --text-muted: #9999aa;
            --card-bg: #23233a;
            --card-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
            --card-shadow-hover: 0 8px 28px rgba(80, 120, 255, 0.25);
            --card-hover-bg: #2d2d48;
            --border-left-color: #5b8cff;
            --toggle-bg: #3a3a5c;
            --toggle-dot: #f0f0ff;
            --icon-filter: brightness(0.92) saturate(1.05);
            --about-divider: #3a3a55;
            --about-link: #7aadff;
        }

        /* ========== 全局重置与基础样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg,
                    var(--bg-gradient-start),
                    var(--bg-gradient-end));
            min-height: 100vh;
            padding: 32px 20px 40px;
            transition: background var(--transition-speed) ease,
                color var(--transition-speed) ease;
            color: var(--text-primary);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
        }

        h2 {
            font-size: 27px;
            color: var(--text-primary);
            margin-bottom: 22px;
            padding-left: 10px;
            border-left: 5px solid var(--border-left-color);
            line-height: 1.3;
            transition: color var(--transition-speed) ease,
                border-color var(--transition-speed) ease;
        }

        /* ========== 分类区块 ========== */
        .section {
            margin-bottom: 44px;
        }

        /* ========== 卡片网格 ========== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
            gap: 18px;
        }

        /* ========== 卡片样式 ========== */
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 10px 14px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease,
                background-color 0.2s ease, background var(--transition-speed) ease,
                box-shadow var(--transition-speed) ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-shadow-hover);
            background-color: var(--card-hover-bg);
        }

        .card:active {
            transform: scale(0.96);
        }

        .card img {
            width: 54px;
            height: 54px;
            object-fit: contain;
            margin-bottom: 8px;
            pointer-events: none;
            user-select: none;
            filter: var(--icon-filter);
            transition: filter var(--transition-speed) ease;
        }

        .card span {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.4;
            word-break: break-word;
            transition: color var(--transition-speed) ease;
        }

        /* ========== 🌗 深色模式切换开关（右上角） ========== */
        .theme-toggle-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            padding: 8px 18px 8px 14px;
            border-radius: 40px;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            user-select: none;
            transition: background var(--transition-speed) ease,
                box-shadow var(--transition-speed) ease;
            border: none;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            box-shadow: var(--card-shadow-hover);
        }

        .theme-toggle .toggle-track {
            position: relative;
            width: 46px;
            height: 26px;
            background: var(--toggle-bg);
            border-radius: 26px;
            transition: background var(--transition-speed) ease;
            flex-shrink: 0;
        }

        .theme-toggle .toggle-dot {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: var(--toggle-dot);
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
            transition: transform var(--transition-speed) ease,
                background var(--transition-speed) ease;
        }

        .dark .theme-toggle .toggle-dot {
            transform: translateX(20px);
        }

        .theme-toggle .toggle-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .theme-toggle .toggle-label .icon-sun,
        .theme-toggle .toggle-label .icon-moon {
            font-size: 17px;
            transition: opacity var(--transition-speed) ease;
        }

        .theme-toggle .toggle-label .icon-sun {
            display: inline-block;
        }
        .theme-toggle .toggle-label .icon-moon {
            display: none;
        }

        .dark .theme-toggle .toggle-label .icon-sun {
            display: none;
        }
        .dark .theme-toggle .toggle-label .icon-moon {
            display: inline-block;
        }

        /* ========== 💬 关于我们 ========== */
        .about-section {
            margin-top: 10px;
            padding-top: 36px;
            border-top: 1px solid var(--about-divider);
            transition: border-color var(--transition-speed) ease;
        }

        .about-inner {
            display: flex;
            flex-wrap: wrap;
            gap: 30px 50px;
            justify-content: space-between;
            align-items: flex-start;
        }

        .about-brand {
            flex: 1 1 240px;
            min-width: 180px;
        }

        .about-brand h3 {
            font-size: 21px;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            transition: color var(--transition-speed) ease;
        }

        .about-brand p {
            font-size: 14.5px;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 10px;
            transition: color var(--transition-speed) ease;
        }

        .about-links {
            flex: 1 1 200px;
            min-width: 150px;
        }

        .about-links h4 {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 10px;
            transition: color var(--transition-speed) ease;
        }

        .about-links ul {
            list-style: none;
            padding: 0;
        }

        .about-links li {
            margin-bottom: 7px;
        }

        .about-links a {
            color: var(--about-link);
            text-decoration: none;
            font-size: 14px;
            transition: color var(--transition-speed) ease, opacity 0.2s;
            opacity: 0.85;
        }

        .about-links a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .about-contact {
            flex: 1 1 220px;
            min-width: 160px;
        }

        .about-contact h4 {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 10px;
            transition: color var(--transition-speed) ease;
        }

        .about-contact p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 4px;
            transition: color var(--transition-speed) ease;
        }

        .about-contact .email {
            color: var(--about-link);
            text-decoration: none;
        }

        .about-contact .email:hover {
            text-decoration: underline;
        }

        .about-footer-note {
            margin-top: 28px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            border-top: 1px solid var(--about-divider);
            padding-top: 22px;
            transition: color var(--transition-speed) ease,
                border-color var(--transition-speed) ease;
        }

        .about-footer-note strong {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* ========== 响应式微调 ========== */
        @media (max-width: 640px) {
            body {
                padding: 20px 12px 30px;
            }
            h2 {
                font-size: 22px;
                margin-bottom: 18px;
            }
            .grid {
                gap: 12px;
                grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
            }
            .card {
                padding: 12px 6px 10px;
            }
            .card img {
                width: 42px;
                height: 42px;
            }
            .card span {
                font-size: 11.5px;
            }
            .theme-toggle {
                padding: 6px 14px 6px 10px;
                font-size: 13px;
            }
            .theme-toggle .toggle-track {
                width: 38px;
                height: 22px;
            }
            .theme-toggle .toggle-dot {
                width: 16px;
                height: 16px;
                top: 3px;
                left: 3px;
            }
            .dark .theme-toggle .toggle-dot {
                transform: translateX(16px);
            }

            .about-inner {
                flex-direction: column;
                gap: 20px;
            }
            .about-brand,
            .about-links,
            .about-contact {
                flex: 1 1 auto;
                width: 100%;
            }
            .about-footer-note {
                font-size: 12px;
                padding-top: 18px;
                margin-top: 22px;
            }
        }

        /* ========== 进入动画（卡片） ========== */
        .card {
            opacity: 0;
            animation: fadeUp 0.45s ease forwards;
        }
        .card:nth-child(1) {
            animation-delay: 0.02s;
        }
        .card:nth-child(2) {
            animation-delay: 0.06s;
        }
        .card:nth-child(3) {
            animation-delay: 0.10s;
        }
        .card:nth-child(4) {
            animation-delay: 0.14s;
        }
        .card:nth-child(5) {
            animation-delay: 0.18s;
        }
        .card:nth-child(6) {
            animation-delay: 0.22s;
        }
        .card:nth-child(7) {
            animation-delay: 0.26s;
        }
        .card:nth-child(8) {
            animation-delay: 0.30s;
        }
        .card:nth-child(9) {
            animation-delay: 0.34s;
        }
        .card:nth-child(10) {
            animation-delay: 0.38s;
        }
        .card:nth-child(11) {
            animation-delay: 0.42s;
        }
        .card:nth-child(12) {
            animation-delay: 0.46s;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

